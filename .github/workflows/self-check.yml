name: Self Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-self-check:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run self-check
        run: swift run iOSAppHackingLab --self-check

      - name: Validate demo media dimensions
        run: swift tools/verify-demo-media.swift

      - name: Generate media manifest
        run: swift tools/generate-media-manifest.swift

      - name: Generate release draft
        run: swift tools/generate-release-draft.swift --version workflow-draft --date "$(date -u +%Y-%m-%d)"

      - name: Upload public demo media
        uses: actions/upload-artifact@v7
        with:
          name: iosapphackinglab-demo-media
          path: |
            artifacts/*.png
            artifacts/*.gif
            artifacts/media-manifest.json
            docs/CI_ARTIFACTS.md
            docs/SIGNED_ENTITLEMENT_API.md
            docs/SAMPLE_STUDY_REPORT.md
            docs/REPORT_EXPORT_FLOW.md
            docs/RELEASE_NOTES_TEMPLATE.md
            docs/RELEASE_DRAFT.md
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
