name: Self Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-self-check:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run self-check
        run: swift run iOSAppHackingLab --self-check
